  <text x="500" y="170" font-family="Inter, sans-serif" font-size="11" fill="#94A3B8">Change failure rate</text>
  <text x="500" y="200" font-family="Inter, sans-serif" font-size="28" font-weight="700" fill="#8B5CF6">5%</text>
