<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <defs><linearGradient id="g" x1="0" y1="0" x2="800" y2="500" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#38BDF8" stop-opacity="0.3"/><stop offset="100%" stop-color="#050816"/></linearGradient></defs>
  <rect width="800" height="500" fill="url(#g)"/>
