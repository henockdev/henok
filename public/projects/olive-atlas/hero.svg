<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-label="Olive & Atlas operations platform">
  <defs>
    <linearGradient id="oa-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1C1B18"/>
      <stop offset="100%" stop-color="#161513"/>
    </linearGradient>
    <linearGradient id="oa-accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C4674A"/>
      <stop offset="100%" stop-color="#B5462C"/>
    </linearGradient>
    <linearGradient id="oa-brass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C9A876"/>
      <stop offset="100%" stop-color="#9C8458"/>
    </linearGradient>
    <linearGradient id="oa-spark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B5462C" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#B5462C" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="url(#oa-bg)"/>
  <rect width="1200" height="800" fill="url(#oa-spark)"/>

  <!-- Subtle grid texture -->
  <g opacity="0.04" stroke="#F2EDE3" stroke-width="1">
    <path d="M0 100H1200M0 200H1200M0 300H1200M0 400H1200M0 500H1200M0 600H1200M0 700H1200"/>
    <path d="M100 0V800M200 0V800M300 0V800M400 0V800M500 0V800M600 0V800M700 0V800M800 0V800M900 0V800M1000 0V800M1100 0V800"/>
  </g>

  <!-- Window chrome -->
  <g transform="translate(60,60)">
    <rect width="1080" height="680" rx="20" fill="#252320" stroke="#3A3631" stroke-width="1"/>
    <rect width="1080" height="44" rx="20" fill="#2B2823"/>
    <rect y="44" width="1080" height="1" fill="#3A3631"/>
    <!-- traffic dots -->
    <circle cx="22" cy="22" r="6" fill="#B5462C"/>
    <circle cx="44" cy="22" r="6" fill="#C9A876"/>
    <circle cx="66" cy="22" r="6" fill="#857F70"/>

    <!-- Brand mark center -->
    <g transform="translate(540,15)">
      <text x="-30" y="14" fill="#F2EDE3" font-family="Georgia, serif" font-size="15" font-style="italic">Olive &amp; Atlas</text>
    </g>

    <!-- Sidebar -->
    <rect x="0" y="45" width="240" height="635" fill="#1F1D1A"/>
    <rect x="240" y="45" width="1" height="635" fill="#3A3631"/>

    <!-- Logo -->
    <g transform="translate(24,80)">
      <circle cx="14" cy="14" r="14" fill="url(#oa-accent)"/>
      <text x="14" y="20" fill="#F2EDE3" font-family="Georgia, serif" font-size="14" text-anchor="middle">O&amp;A</text>
    </g>
    <text x="62" y="98" fill="#F2EDE3" font-family="Inter, sans-serif" font-size="15" font-weight="600">Atlas House</text>
    <text x="62" y="116" fill="#857F70" font-family="Inter, sans-serif" font-size="11">Manager workspace</text>

    <!-- Sidebar nav -->
    <g transform="translate(0,160)" font-family="Inter, sans-serif" font-size="13">
      <rect x="12" y="0" width="216" height="34" rx="8" fill="rgba(181,70,44,0.18)"/>
      <text x="38" y="22" fill="#F2EDE3">Overview</text>
      <text x="76" y="22" fill="#C9A876">●</text>
      <text x="38" y="64" fill="#B8B0A0">Analytics</text>
      <text x="38" y="106" fill="#B8B0A0">Reservations</text>
      <text x="38" y="148" fill="#B8B0A0">AI Insights</text>
      <text x="38" y="190" fill="#B8B0A0">Reports</text>
      <text x="38" y="232" fill="#B8B0A0">Automations</text>
      <text x="38" y="274" fill="#B8B0A0">Integrations</text>
      <text x="38" y="316" fill="#B8B0A0">Settings</text>
    </g>

    <!-- Top bar -->
    <rect x="241" y="45" width="839" height="64" fill="#252320"/>
    <rect x="241" y="109" width="839" height="1" fill="#3A3631"/>
    <text x="270" y="83" fill="#F2EDE3" font-family="Georgia, serif" font-size="22" font-weight="600">Good morning, Eleanor</text>
    <text x="270" y="103" fill="#857F70" font-family="Inter, sans-serif" font-size="11">Tuesday, Sep 9 · 4 properties</text>

    <!-- Property chips -->
    <g transform="translate(770,68)">
      <rect width="80" height="28" rx="14" fill="#1C1B18" stroke="#3A3631"/>
      <text x="40" y="18" text-anchor="middle" fill="#F2EDE3" font-family="Inter, sans-serif" font-size="11">All</text>
      <rect x="90" width="100" height="28" rx="14" fill="rgba(181,70,44,0.2)" stroke="#B5462C"/>
      <text x="140" y="18" text-anchor="middle" fill="#C4674A" font-family="Inter, sans-serif" font-size="11">Atlas House</text>
    </g>

    <!-- Main area -->
    <g transform="translate(265,130)">
      <!-- KPI row -->
      <g>
        <rect width="190" height="100" rx="12" fill="#1F1D1A" stroke="#3A3631"/>
        <text x="16" y="28" fill="#857F70" font-family="Inter, sans-serif" font-size="10" letter-spacing="2">REVENUE TODAY</text>
        <text x="16" y="68" fill="#F2EDE3" font-family="Georgia, serif" font-size="28" font-weight="600">$28,420</text>
        <text x="16" y="88" fill="#C9A876" font-family="Inter, sans-serif" font-size="11">↑ 12% vs avg</text>

        <rect x="200" width="190" height="100" rx="12" fill="#1F1D1A" stroke="#3A3631"/>
        <text x="216" y="28" fill="#857F70" font-family="Inter, sans-serif" font-size="10" letter-spacing="2">COVERS</text>
        <text x="216" y="68" fill="#F2EDE3" font-family="Georgia, serif" font-size="28" font-weight="600">412</text>
        <text x="216" y="88" fill="#C9A876" font-family="Inter, sans-serif" font-size="11">↑ 8% vs avg</text>

        <rect x="400" width="190" height="100" rx="12" fill="#1F1D1A" stroke="#3A3631"/>
        <text x="416" y="28" fill="#857F70" font-family="Inter, sans-serif" font-size="10" letter-spacing="2">LABOUR %</text>
        <text x="416" y="68" fill="#F2EDE3" font-family="Georgia, serif" font-size="28" font-weight="600">26.4%</text>
        <text x="416" y="88" fill="#C9A876" font-family="Inter, sans-serif" font-size="11">↓ 1.2 pts</text>

        <rect x="600" width="190" height="100" rx="12" fill="#1F1D1A" stroke="#3A3631"/>
        <text x="616" y="28" fill="#857F70" font-family="Inter, sans-serif" font-size="10" letter-spacing="2">GUEST NPS</text>
        <text x="616" y="68" fill="#F2EDE3" font-family="Georgia, serif" font-size="28" font-weight="600">72</text>
        <text x="616" y="88" fill="#C9A876" font-family="Inter, sans-serif" font-size="11">↑ 4 vs Q2</text>
      </g>

      <!-- Chart -->
      <g transform="translate(0,124)">
        <rect width="510" height="220" rx="12" fill="#1F1D1A" stroke="#3A3631"/>
        <text x="20" y="32" fill="#F2EDE3" font-family="Georgia, serif" font-size="16">Revenue · 7 days</text>
        <text x="20" y="50" fill="#857F70" font-family="Inter, sans-serif" font-size="11">Across all four properties</text>

        <!-- line chart -->
        <path d="M40 180 L100 150 L160 165 L220 120 L280 135 L340 90 L400 100 L460 70"
          stroke="url(#oa-accent)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <path d="M40 180 L100 150 L160 165 L220 120 L280 135 L340 90 L400 100 L460 70 L460 200 L40 200 Z"
          fill="url(#oa-accent)" fill-opacity="0.15"/>

        <!-- dots -->
        <g fill="#C4674A">
          <circle cx="40" cy="180" r="3.5"/>
          <circle cx="100" cy="150" r="3.5"/>
          <circle cx="160" cy="165" r="3.5"/>
          <circle cx="220" cy="120" r="3.5"/>
          <circle cx="280" cy="135" r="3.5"/>
          <circle cx="340" cy="90" r="3.5"/>
          <circle cx="400" cy="100" r="3.5"/>
          <circle cx="460" cy="70" r="3.5" stroke="#F2EDE3" stroke-width="2"/>
        </g>

        <g font-family="Inter, sans-serif" font-size="9" fill="#857F70">
          <text x="38" y="215">Mon</text>
          <text x="98" y="215">Tue</text>
          <text x="158" y="215">Wed</text>
          <text x="218" y="215">Thu</text>
          <text x="278" y="215">Fri</text>
          <text x="338" y="215">Sat</text>
          <text x="398" y="215">Sun</text>
        </g>
      </g>

      <!-- Olive AI panel -->
      <g transform="translate(520,124)">
        <rect width="270" height="220" rx="12" fill="#1F1D1A" stroke="#3A3631"/>
        <circle cx="30" cy="32" r="14" fill="url(#oa-accent)"/>
        <text x="30" y="38" text-anchor="middle" fill="#F2EDE3" font-family="Georgia, serif" font-size="13" font-weight="600">O</text>
        <text x="56" y="32" fill="#F2EDE3" font-family="Georgia, serif" font-size="15" font-weight="600">Olive</text>
        <text x="56" y="48" fill="#857F70" font-family="Inter, sans-serif" font-size="10">Your AI copilot · grounded in your data</text>

        <!-- Insight card -->
        <g transform="translate(16,72)">
          <rect width="238" height="76" rx="8" fill="rgba(181,70,44,0.12)" stroke="#B5462C"/>
          <text x="14" y="22" fill="#C9A876" font-family="Inter, sans-serif" font-size="10" letter-spacing="1.5">REVENUE · HIGH IMPACT</text>
          <text x="14" y="42" fill="#F2EDE3" font-family="Georgia, serif" font-size="13">Atlas House covers down 18%</text>
          <text x="14" y="58" fill="#B8B0A0" font-family="Inter, sans-serif" font-size="10">Tue lunch traffic missing —</text>
          <text x="14" y="71" fill="#B8B0A0" font-family="Inter, sans-serif" font-size="10">opens 11am, peaks 1pm empty.</text>
          <text x="14" y="86" fill="#C9A876" font-family="Inter, sans-serif" font-size="10">Est. lift: $7,360/mo</text>
        </g>

        <!-- Insight card 2 -->
        <g transform="translate(16,158)">
          <rect width="238" height="48" rx="8" fill="#252320" stroke="#3A3631"/>
          <text x="14" y="20" fill="#C9A876" font-family="Inter, sans-serif" font-size="9" letter-spacing="1.5">INVENTORY · MEDIUM</text>
          <text x="14" y="38" fill="#B8B0A0" font-family="Inter, sans-serif" font-size="10">Meadowbrook lead time creeping up.</text>
        </g>
      </g>

      <!-- Reservations strip -->
      <g transform="translate(0,366)">
        <rect width="790" height="62" rx="12" fill="#1F1D1A" stroke="#3A3631"/>
        <text x="20" y="26" fill="#F2EDE3" font-family="Georgia, serif" font-size="14">Reservations · this evening</text>
        <g font-family="Inter, sans-serif" font-size="11">
          <g transform="translate(20,38)">
            <circle cx="0" cy="8" r="4" fill="#B5462C"/>
            <text x="14" y="12" fill="#F2EDE3">7:00 · Lin, 2</text>
            <text x="120" y="12" fill="#857F70">Atlas House</text>
          </g>
          <g transform="translate(280,38)">
            <circle cx="0" cy="8" r="4" fill="#C9A876"/>
            <text x="14" y="12" fill="#F2EDE3">7:30 · Vega, 4</text>
            <text x="120" y="12" fill="#857F70">Olive &amp; Vine</text>
          </g>
          <g transform="translate(540,38)">
            <circle cx="0" cy="8" r="4" fill="#857F70"/>
            <text x="14" y="12" fill="#F2EDE3">8:00 · Park, 6</text>
            <text x="120" y="12" fill="#857F70">Halcyon</text>
          </g>
        </g>
      </g>
    </g>
  </g>

  <!-- Brand title bottom-left -->
  <g transform="translate(60,750)" font-family="Georgia, serif" fill="#F2EDE3">
    <text font-size="14" font-style="italic">Olive &amp; Atlas · One calm dashboard for every property</text>
  </g>
</svg>
