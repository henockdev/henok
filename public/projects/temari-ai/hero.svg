<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-label="TemariAi — AI tutor for African students">
  <defs>
    <linearGradient id="tm-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="tm-cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="tm-sun" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#EF4444"/>
    </linearGradient>
    <linearGradient id="tm-violet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="800" fill="url(#tm-bg)"/>

  <!-- Soft glow background -->
  <g opacity="0.18">
    <circle cx="200" cy="200" r="220" fill="url(#tm-cyan)"/>
    <circle cx="1000" cy="600" r="240" fill="url(#tm-sun)"/>
    <circle cx="600" cy="400" r="180" fill="url(#tm-violet)"/>
  </g>

  <!-- Top bar -->
  <g transform="translate(60,60)">
    <g>
      <rect width="50" height="50" rx="14" fill="url(#tm-cyan)"/>
      <text x="25" y="32" text-anchor="middle" fill="#020617" font-family="Inter, sans-serif" font-size="22" font-weight="800">ᛗ</text>
    </g>
    <text x="68" y="32" fill="#FFFFFF" font-family="Inter, sans-serif" font-size="18" font-weight="700">TemariAi</text>
    <text x="68" y="48" fill="#94A3B8" font-family="Inter, sans-serif" font-size="11">ተማሪ AI · Student AI</text>
    <g transform="translate(900,18)">
      <rect width="160" height="36" rx="18" fill="#0F172A" stroke="#1E293B"/>
      <circle cx="20" cy="18" r="5" fill="#34D1A1"/>
      <text x="34" y="22" fill="#94A3B8" font-family="Inter, sans-serif" font-size="11">XP 12,840 · Level 14</text>
    </g>
  </g>

  <!-- Phone screen (left) -->
  <g transform="translate(120,160)">
    <!-- Phone body -->
    <rect width="380" height="600" rx="42" fill="#020617" stroke="#1E293B" stroke-width="2"/>
    <rect x="10" y="10" width="360" height="580" rx="34" fill="#0F172A"/>
    <!-- Notch -->
    <rect x="120" y="20" width="140" height="22" rx="11" fill="#020617"/>

    <!-- Status -->
    <text x="34" y="68" fill="#94A3B8" font-family="Inter, sans-serif" font-size="10" letter-spacing="2">PROBLEM</text>
    <text x="34" y="100" fill="#FFFFFF" font-family="Inter, sans-serif" font-size="20" font-weight="700">Solve the equation</text>

    <!-- Problem box (handwritten look) -->
    <g transform="translate(34,128)">
      <rect width="312" height="148" rx="14" fill="#1E293B"/>
      <!-- Math equation rendered as text -->
      <g transform="translate(20,20)" font-family="Georgia, serif" font-size="22">
        <text x="0" y="50" fill="#FFFFFF">2x² + 5x − 3 = 0</text>
        <text x="0" y="92" fill="#22D3EE" font-size="14">find x ∈ ℝ</text>
      </g>
    </g>

    <!-- Steps -->
    <g transform="translate(34,300)" font-family="Inter, sans-serif">
      <text x="0" y="0" fill="#22D3EE" font-size="11" letter-spacing="2">STEP 1 · FACTOR</text>
      <text x="0" y="22" fill="#FFFFFF" font-size="12">(2x − 1)(x + 3) = 0</text>

      <text x="0" y="58" fill="#22D3EE" font-size="11" letter-spacing="2">STEP 2 · ROOTS</text>
      <text x="0" y="80" fill="#FFFFFF" font-size="12">x = ½,  x = −3</text>

      <text x="0" y="116" fill="#22D3EE" font-size="11" letter-spacing="2">STEP 3 · VERIFY</text>
      <text x="0" y="138" fill="#10B981" font-size="12">✓ Both roots confirmed</text>
    </g>

    <!-- CTA -->
    <g transform="translate(34,460)">
      <rect width="312" height="48" rx="24" fill="url(#tm-cyan)"/>
      <text x="156" y="30" text-anchor="middle" fill="#020617" font-family="Inter, sans-serif" font-size="13" font-weight="700">Save to my notebook</text>
    </g>

    <!-- Bottom nav -->
    <g transform="translate(34,540)" font-family="Inter, sans-serif" font-size="10">
      <g>
        <rect width="70" height="34" rx="17" fill="#1E293B"/>
        <text x="35" y="22" text-anchor="middle" fill="#22D3EE">Solve</text>
      </g>
      <g transform="translate(80,0)">
        <text x="35" y="22" text-anchor="middle" fill="#94A3B8">Quests</text>
      </g>
      <g transform="translate(160,0)">
        <text x="35" y="22" text-anchor="middle" fill="#94A3B8">Battles</text>
      </g>
      <g transform="translate(240,0)">
        <text x="35" y="22" text-anchor="middle" fill="#94A3B8">Friends</text>
      </g>
    </g>
  </g>

  <!-- Right: Solver pipeline + AI insights -->
  <g transform="translate(560,160)">
    <!-- Title -->
    <text x="0" y="0" fill="#FFFFFF" font-family="Inter, sans-serif" font-size="22" font-weight="700">Solver pipeline</text>
    <text x="0" y="22" fill="#94A3B8" font-family="Inter, sans-serif" font-size="13">Handwritten → symbolic → verified</text>

    <!-- Pipeline -->
    <g transform="translate(0,52)">
      <!-- Step 1 -->
      <rect width="180" height="120" rx="14" fill="#0F172A" stroke="#1E293B"/>
      <circle cx="22" cy="22" r="12" fill="url(#tm-violet)"/>
      <text x="22" y="27" text-anchor="middle" fill="#FFFFFF" font-family="Inter, sans-serif" font-size="11" font-weight="700">1</text>
      <text x="22" y="58" fill="#FFFFFF" font-family="Inter, sans-serif" font-size="12" font-weight="600">Vision</text>
      <text x="22" y="76" fill="#94A3B8" font-family="Inter, sans-serif" font-size="10">Gemini Vision</text>
      <text x="22" y="92" fill="#94A3B8" font-family="Inter, sans-serif" font-size="10">image → symbols</text>

      <!-- Step 2 -->
      <rect x="200" width="180" height="120" rx="14" fill="#0F172A" stroke="#1E293B"/>
      <circle cx="222" cy="22" r="12" fill="url(#tm-cyan)"/>
      <text x="222" y="27" text-anchor="middle" fill="#020617" font-family="Inter, sans-serif" font-size="11" font-weight="700">2</text>
      <text x="222" y="58" fill="#FFFFFF" font-family="Inter, sans-serif" font-size="12" font-weight="600">Solver</text>
      <text x="222" y="76" fill="#94A3B8" font-family="Inter, sans-serif" font-size="10">Math · Physics · Chem</text>
      <text x="222" y="92" fill="#94A3B8" font-family="Inter, sans-serif" font-size="10">verified answer</text>

      <!-- Step 3 -->
      <rect x="400" width="180" height="120" rx="14" fill="#0F172A" stroke="#1E293B"/>
      <circle cx="422" cy="22" r="12" fill="url(#tm-sun)"/>
      <text x="422" y="27" text-anchor="middle" fill="#020617" font-family="Inter, sans-serif" font-size="11" font-weight="700">3</text>
      <text x="422" y="58" fill="#FFFFFF" font-family="Inter, sans-serif" font-size="12" font-weight="600">Explain</text>
      <text x="422" y="76" fill="#94A3B8" font-family="Inter, sans-serif" font-size="10">Groq · step-by-step</text>
      <text x="422" y="92" fill="#94A3B8" font-family="Inter, sans-serif" font-size="10">student friendly</text>

      <!-- arrows -->
      <path d="M180 100 L200 100" stroke="#94A3B8" stroke-width="1.5" fill="none" stroke-dasharray="3 3"/>
      <path d="M380 100 L400 100" stroke="#94A3B8" stroke-width="1.5" fill="none" stroke-dasharray="3 3"/>
    </g>

    <!-- Stats -->
    <g transform="translate(0,200)">
      <rect width="580" height="160" rx="14" fill="#0F172A" stroke="#1E293B"/>
      <text x="20" y="32" fill="#94A3B8" font-family="Inter, sans-serif" font-size="10" letter-spacing="2">THIS WEEK · LEADERBOARD</text>

      <!-- Bar chart -->
      <g transform="translate(20,52)">
        <rect x="0" y="20" width="60" height="60" rx="6" fill="url(#tm-cyan)" opacity="0.4"/>
        <rect x="0" y="0" width="60" height="80" rx="6" fill="url(#tm-cyan)"/>
        <text x="30" y="98" text-anchor="middle" fill="#94A3B8" font-family="Inter, sans-serif" font-size="9">Math</text>

        <rect x="80" y="40" width="60" height="40" rx="6" fill="url(#tm-violet)" opacity="0.4"/>
        <rect x="80" y="20" width="60" height="60" rx="6" fill="url(#tm-violet)"/>
        <text x="110" y="98" text-anchor="middle" fill="#94A3B8" font-family="Inter, sans-serif" font-size="9">Physics</text>

        <rect x="160" y="55" width="60" height="25" rx="6" fill="url(#tm-sun)" opacity="0.4"/>
        <rect x="160" y="40" width="60" height="40" rx="6" fill="url(#tm-sun)"/>
        <text x="190" y="98" text-anchor="middle" fill="#94A3B8" font-family="Inter, sans-serif" font-size="9">Chemistry</text>

        <rect x="240" y="30" width="60" height="50" rx="6" fill="url(#tm-cyan)" opacity="0.4"/>
        <rect x="240" y="10" width="60" height="70" rx="6" fill="url(#tm-cyan)"/>
        <text x="270" y="98" text-anchor="middle" fill="#94A3B8" font-family="Inter, sans-serif" font-size="9">Quests</text>

        <rect x="320" y="50" width="60" height="30" rx="6" fill="url(#tm-violet)" opacity="0.4"/>
        <rect x="320" y="30" width="60" height="50" rx="6" fill="url(#tm-violet)"/>
        <text x="350" y="98" text-anchor="middle" fill="#94A3B8" font-family="Inter, sans-serif" font-size="9">Battles</text>
      </g>

      <!-- right meta -->
      <g transform="translate(450,52)">
        <text x="0" y="0" fill="#94A3B8" font-family="Inter, sans-serif" font-size="10">Problems solved</text>
        <text x="0" y="32" fill="#FFFFFF" font-family="Inter, sans-serif" font-size="28" font-weight="700">428</text>
        <text x="0" y="64" fill="#94A3B8" font-family="Inter, sans-serif" font-size="10">Active students</text>
        <text x="0" y="92" fill="#FFFFFF" font-family="Inter, sans-serif" font-size="22" font-weight="600">2,184</text>
      </g>
    </g>

    <!-- Stack -->
    <g transform="translate(0,388)" font-family="Inter, sans-serif">
      <text x="0" y="0" fill="#94A3B8" font-size="11" letter-spacing="2">STACK</text>
      <g transform="translate(0,16)">
        <g>
          <rect width="84" height="26" rx="13" fill="#1E293B"/>
          <text x="42" y="17" text-anchor="middle" fill="#22D3EE" font-size="11">FastAPI</text>
        </g>
        <g transform="translate(94,0)">
          <rect width="84" height="26" rx="13" fill="#1E293B"/>
          <text x="42" y="17" text-anchor="middle" fill="#22D3EE" font-size="11">Supabase</text>
        </g>
        <g transform="translate(188,0)">
          <rect width="84" height="26" rx="13" fill="#1E293B"/>
          <text x="42" y="17" text-anchor="middle" fill="#22D3EE" font-size="11">Firebase</text>
        </g>
        <g transform="translate(282,0)">
          <rect width="84" height="26" rx="13" fill="#1E293B"/>
          <text x="42" y="17" text-anchor="middle" fill="#22D3EE" font-size="11">Gemini</text>
        </g>
        <g transform="translate(376,0)">
          <rect width="84" height="26" rx="13" fill="#1E293B"/>
          <text x="42" y="17" text-anchor="middle" fill="#22D3EE" font-size="11">Groq</text>
        </g>
        <g transform="translate(470,0)">
          <rect width="100" height="26" rx="13" fill="#1E293B"/>
          <text x="50" y="17" text-anchor="middle" fill="#22D3EE" font-size="11">Android · Kotlin</text>
        </g>
      </g>
    </g>
  </g>

  <!-- Bottom -->
  <g transform="translate(0,750)" font-family="Inter, sans-serif">
    <text x="600" y="0" text-anchor="middle" fill="#94A3B8" font-size="12">ተማሪ AI · AI tutor for African students</text>
  </g>
</svg>
