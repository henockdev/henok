<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#050816"/>
      <stop offset="100%" stop-color="#0B1120"/>
    </linearGradient>
    <linearGradient id="text" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <radialGradient id="orb1" cx="200" cy="180" r="220" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="1000" cy="450" r="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#orb1)"/>
  <rect width="1200" height="630" fill="url(#orb2)"/>

  <!-- Grid -->
  <g stroke="#FFFFFF" stroke-opacity="0.04">
    <line x1="0" y1="157" x2="1200" y2="157"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="473" x2="1200" y2="473"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
  </g>

  <!-- Logo mark -->
  <g transform="translate(80, 80)">
    <rect width="64" height="64" rx="16" fill="url(#text)"/>
    <path d="M20 44 V20 L32 36 L44 20 V44" stroke="#fff" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
  <text x="160" y="125" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="600" fill="#fff">Henok Amdiye Endeshaw</text>
  <text x="160" y="148" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#94A3B8">Software Engineer · AI Developer · Mobile · ITSM</text>

  <!-- Headline -->
  <text x="80" y="320" font-family="Inter, system-ui, sans-serif" font-size="76" font-weight="800" fill="#fff" letter-spacing="-2">Ship software that</text>
  <text x="80" y="410" font-family="Inter, system-ui, sans-serif" font-size="76" font-weight="800" fill="url(#text)" letter-spacing="-2">moves business metrics.</text>

  <text x="80" y="490" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#94A3B8">AI · Mobile · Full-stack · ITSM — built end-to-end from Addis Ababa.</text>

  <!-- Pills -->
  <g transform="translate(80, 540)">
    <rect width="120" height="38" rx="19" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)"/>
    <text x="60" y="24" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#fff" text-anchor="middle">AI Engineering</text>
  </g>
  <g transform="translate(212, 540)">
    <rect width="130" height="38" rx="19" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)"/>
    <text x="65" y="24" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#fff" text-anchor="middle">Mobile Apps</text>
  </g>
  <g transform="translate(354, 540)">
    <rect width="135" height="38" rx="19" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)"/>
    <text x="67" y="24" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#fff" text-anchor="middle">ITSM · Banking</text>
  </g>
  <g transform="translate(501, 540)">
    <rect width="135" height="38" rx="19" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)"/>
    <text x="67" y="24" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#fff" text-anchor="middle">Full-stack Web</text>
  </g>
</svg>
